<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>中国語カメラ学習</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Gemini API 版：外部ライブラリ不要 -->
  <style>
    /* ── Design tokens ── */
    :root {
      --ink:        #06060b;
      --panel:      rgba(8, 8, 14, 0.90);
      --amber:      #e8a020;
      --amber-dim:  rgba(232, 160, 32, 0.18);
      --amber-glow: rgba(232, 160, 32, 0.28);
      --white:      #f2ede6;
      --sub:        #9a9490;
      --muted:      #48453f;
      --danger:     #c06060;
    }

    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--ink);
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Camera area ── */
    #camera-area {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: #000;
    }

    #video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    #canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── Floating header ── */
    #app-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 40px;
      background: linear-gradient(to bottom, rgba(6,6,11,0.75) 0%, transparent 100%);
    }

    #app-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--sub);
    }

    /* Detection status dot */
    #status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.4s, box-shadow 0.4s;
    }
    #status-dot.live {
      background: var(--amber);
      box-shadow: 0 0 10px var(--amber);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }

    /* ── Bottom panel ── */
    #bottom-panel {
      position: relative;
      z-index: 10;
      background: var(--panel);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border-top: 1px solid rgba(232, 160, 32, 0.12);
      padding: 28px 24px 40px;
    }

    /* Word area */
    #word-area {
      text-align: center;
      margin-bottom: 24px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    #chinese-char {
      font-family: 'Noto Serif SC', serif;
      font-size: 68px;
      font-weight: 700;
      line-height: 1;
      color: var(--white);
      letter-spacing: -0.01em;
      transition: color 0.25s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #chinese-char.new-word {
      color: var(--amber);
      transform: scale(1.06);
    }

    #pinyin {
      font-size: 19px;
      font-weight: 300;
      color: var(--amber);
      letter-spacing: 0.14em;
      min-height: 26px;
    }

    #japanese {
      font-size: 13px;
      font-weight: 400;
      color: var(--sub);
      letter-spacing: 0.06em;
    }

    /* Controls */
    #controls {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Repeat button */
    #repeat-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(232, 160, 32, 0.25);
      background: var(--amber-dim);
      color: var(--amber);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s ease;
      flex-shrink: 0;
    }
    #repeat-btn:not(:disabled):active {
      background: rgba(232, 160, 32, 0.32);
      transform: scale(0.90) rotate(-20deg);
    }
    #repeat-btn:disabled {
      opacity: 0.22;
      cursor: not-allowed;
    }

    /* Speak button */
    #speak-btn {
      flex: 1;
      height: 54px;
      border-radius: 100px;
      border: none;
      background: var(--amber);
      color: #07050a;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 28px var(--amber-glow);
      position: relative;
      overflow: hidden;
    }
    #speak-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 55%);
      border-radius: inherit;
      pointer-events: none;
    }
    #speak-btn:not(:disabled):active {
      transform: scale(0.95);
      box-shadow: 0 2px 12px var(--amber-glow);
    }
    #speak-btn:disabled {
      opacity: 0.28;
      cursor: not-allowed;
      box-shadow: none;
    }
    #speak-btn .btn-icon { font-size: 17px; }

    /* ── Loading overlay ── */
    #loading-overlay {
      position: fixed; inset: 0;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      gap: 24px;
    }
    #loading-overlay.hidden { display: none; }

    .ring {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1.5px solid rgba(232, 160, 32, 0.14);
      border-top-color: var(--amber);
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-label {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* ── Error overlay ── */
    #error-overlay {
      position: fixed; inset: 0;
      background: rgba(6, 6, 11, 0.96);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
      padding: 36px;
    }
    #error-overlay.show { display: flex; }

    #error-box {
      text-align: center;
      max-width: 300px;
    }
    #error-icon {
      font-size: 36px;
      margin-bottom: 18px;
      opacity: 0.7;
    }
    #error-message {
      font-size: 15px;
      color: var(--danger);
      line-height: 1.8;
      white-space: pre-line;
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading-overlay">
    <div class="ring"></div>
    <div id="loading-label">モデルを読み込み中...</div>
  </div>

  <!-- Error -->
  <div id="error-overlay">
    <div id="error-box">
      <div id="error-icon">⚠</div>
      <div id="error-message"></div>
    </div>
  </div>

  <!-- Camera area -->
  <div id="camera-area">
    <header id="app-header">
      <span id="app-title">中国語カメラ学習</span>
      <div id="status-dot"></div>
    </header>
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
  </div>

  <!-- Bottom panel -->
  <div id="bottom-panel">
    <div id="word-area">
      <div id="chinese-char">—</div>
      <div id="pinyin"></div>
      <div id="japanese">カメラに物をかざしてください</div>
    </div>
    <div id="controls">
      <button id="repeat-btn" disabled title="もう一度聞く">↺</button>
      <button id="speak-btn" disabled>
        <span class="btn-icon">🔊</span>
        <span>発音する</span>
      </button>
    </div>
  </div>

  <script>
    // ===== Gemini API 設定 =====
    // APIキーはlocalStorageに保存（コードには埋め込まない）
    let GEMINI_API_KEY = localStorage.getItem('gemini_api_key') || '';
    const GEMINI_URL = () =>
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

    // ===== DOM =====
    const video          = document.getElementById('video');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingLabel   = document.getElementById('loading-label');
    const errorOverlay   = document.getElementById('error-overlay');
    const errorMessage   = document.getElementById('error-message');
    const chineseChar    = document.getElementById('chinese-char');
    const pinyinEl       = document.getElementById('pinyin');
    const japaneseEl     = document.getElementById('japanese');
    const speakBtn       = document.getElementById('speak-btn');
    const repeatBtn      = document.getElementById('repeat-btn');
    const statusDot      = document.getElementById('status-dot');

    // ===== 状態 =====
    const ttsEnabled = 'speechSynthesis' in window;
    let currentEntry    = null;
    let lastSpokenEntry = null;
    let isRequesting    = false;  // API多重呼び出し防止

    // ===== エラー表示 =====
    function showError(msg) {
      errorMessage.textContent = msg;
      errorOverlay.classList.add('show');
    }

    // ===== 発音 =====
    function speak(text) {
      if (!ttsEnabled) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'zh-CN';
      utter.rate = 0.8;
      window.speechSynthesis.speak(utter);
    }

    // ===== パネル更新（表示のみ） =====
    function updatePanel(entry) {
      if (!entry || !entry.zh) return;
      if (currentEntry && currentEntry.zh === entry.zh) return;
      currentEntry = entry;

      chineseChar.classList.remove('new-word');
      void chineseChar.offsetWidth;
      chineseChar.classList.add('new-word');
      setTimeout(() => chineseChar.classList.remove('new-word'), 400);

      chineseChar.textContent = entry.zh;
      pinyinEl.textContent    = entry.pinyin;
      japaneseEl.textContent  = entry.ja;
      speakBtn.disabled = false;
    }

    // ===== 発音ボタン =====
    speakBtn.addEventListener('click', () => {
      if (!currentEntry) return;
      speak(currentEntry.zh);
      lastSpokenEntry = currentEntry;
      repeatBtn.disabled = false;
    });

    // ===== リピートボタン =====
    repeatBtn.addEventListener('click', () => {
      if (!lastSpokenEntry) return;
      speak(lastSpokenEntry.zh);
    });

    // ===== ビデオフレームをbase64 JPEGとして取得 =====
    function captureFrame() {
      const cvs = document.createElement('canvas');
      cvs.width  = 640;
      cvs.height = 480;
      cvs.getContext('2d').drawImage(video, 0, 0, cvs.width, cvs.height);
      return cvs.toDataURL('image/jpeg', 0.7).split(',')[1];
    }

    // ===== Gemini API で物体認識 =====
    async function classifyWithGemini() {
      if (video.readyState < 2 || isRequesting) return;
      isRequesting = true;
      statusDot.classList.add('live');

      try {
        const base64 = captureFrame();
        const prompt =
          'この画像に写っている最も目立つ物体や食べ物を1つ特定してください。\n' +
          '必ず以下のJSONのみで返答してください（前後に説明文不要）：\n' +
          '{"zh":"簡体字中国語","pinyin":"声調記号付きピンイン（スペース区切り）","ja":"日本語名"}\n' +
          '物体を特定できない場合は {"zh":"","pinyin":"","ja":""} を返してください。';

        const res = await fetch(GEMINI_URL(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [
              { text: prompt },
              { inline_data: { mime_type: 'image/jpeg', data: base64 } }
            ]}],
            generationConfig: { temperature: 0, maxOutputTokens: 80 }
          })
        });

        if (!res.ok) throw new Error(`API error: ${res.status}`);
        const data = await res.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text ?? '';
        const match = text.match(/\{[^}]+\}/);
        if (match) {
          const entry = JSON.parse(match[0]);
          updatePanel(entry);
        }
        if (!currentEntry) statusDot.classList.remove('live');
      } catch (e) {
        console.warn('Gemini API error:', e);
        statusDot.classList.remove('live');
      } finally {
        isRequesting = false;
      }
    }

    // ===== 認識ループ（2秒ごとにGemini呼び出し） =====
    function startDetectionLoop() {
      setInterval(classifyWithGemini, 2000);
    }

    // ===== カメラ起動 =====
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        video.srcObject = stream;
        await new Promise(resolve => { video.onloadedmetadata = resolve; });
      } catch (e) {
        showError('カメラの使用を許可してください。\nブラウザの設定からカメラを許可した後、ページを再読み込みしてください。');
        throw e;
      }
    }

    // ===== APIキー入力プロンプト =====
    function promptForApiKey() {
      const key = window.prompt(
        'Gemini APIキーを入力してください。\n（Google AI Studio: https://aistudio.google.com/app/apikey）\n\n一度入力すると端末に保存され、次回から不要です。'
      );
      if (key && key.trim()) {
        GEMINI_API_KEY = key.trim();
        localStorage.setItem('gemini_api_key', GEMINI_API_KEY);
        return true;
      }
      return false;
    }

    // ===== 初期化（モデル読み込み不要） =====
    async function init() {
      try {
        // APIキー未設定なら入力を求める
        if (!GEMINI_API_KEY) {
          if (!promptForApiKey()) {
            showError('APIキーが必要です。\nページを再読み込みして入力してください。');
            return;
          }
        }
        loadingLabel.textContent = 'カメラを起動中...';
        await startCamera();
        loadingOverlay.classList.add('hidden');
        startDetectionLoop();
      } catch (e) {
        if (!errorOverlay.classList.contains('show')) {
          showError('読み込みに失敗しました。\nページを再読み込みしてください。');
        }
      }
    }

    init();
  </script>
</body>
</html>
